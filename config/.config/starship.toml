# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = true

# The git_added/git_deleted custom modules shell out to git; give them headroom
# over the 500ms default so they don't time out on large repos or cold caches.
command_timeout = 1000

# Default $all layout, but with $git_metrics swapped for the custom
# git_added/git_deleted modules in the same slot (they count untracked files,
# which git_metrics can't). $custom is dropped so they don't render twice.
format = '$username$hostname$localip$shlvl$singularity$kubernetes$nats$directory$vcsh$fossil_branch$fossil_metrics$git_branch$git_commit$git_state${custom.git_added}${custom.git_deleted}$git_status$hg_branch$hg_state$pijul_channel$docker_context$package$bun$c$cmake$cobol$cpp$daml$dart$deno$dotnet$elixir$elm$erlang$fennel$fortran$gleam$golang$gradle$haskell$haxe$helm$java$julia$kotlin$lua$maven$mojo$nim$nodejs$ocaml$odin$opa$perl$php$pulumi$purescript$python$quarto$raku$rlang$red$ruby$rust$scala$solidity$swift$terraform$typst$vlang$vagrant$xmake$zig$buf$guix_shell$nix_shell$conda$pixi$meson$spack$memory_usage$aws$gcloud$openstack$azure$direnv$env_var$mise$crystal$sudo$cmd_duration$line_break$jobs$battery$time$status$container$netns$os$shell$character'

# Replace the '❯' symbol in the prompt with '➜'
[character] # The name of the module we are configuring is 'character'
success_symbol = '[➜](bold green)' # The 'success_symbol' segment is being set to '➜' with the color 'bold green'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[aws]
disabled = true

[git_branch]
style = 'yellow'

# Replaced by the custom modules below, which count untracked files as additions.
[git_metrics]
disabled = true

[custom.git_added]
description = "Added lines, including untracked files"
command = 'starship-git-metrics added'
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
format = '([+$output](bold green) )'
shell = ['bash', '--noprofile', '--norc']

[custom.git_deleted]
description = "Deleted lines"
command = 'starship-git-metrics deleted'
when = 'git rev-parse --is-inside-work-tree 2>/dev/null'
format = '([-$output](bold red) )'
shell = ['bash', '--noprofile', '--norc']
